<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <title>Calculadora de Eficiência - Aparelhos</title>
</head>
<body>
  <header class="header">
    <div class="header__text">
      <h1>Calcule a eficiência energética da sua casa!</h1>
      <p>Seja proativo e resolva o problema do consumo excessivo de energia!</p>
    </div>
  </header>
  <main>
    <h2 class="main__title">Especifique o número de aparelhos que consomem eletricidade:</h2>
    <ul class="list" id="list">
      
      <!-- Opção 1: 3 aparelhos -->
      <li class="list__item">
        <a href="/{{ size }}/{{ lights }}/3">
          <img class="item__img" src="{{ url_for('static', filename='img/battery.svg') }}" alt="battery">
          <span>1-3 aparelhos</span>
        </a>
      </li>

      <!-- Opção 2: 6 aparelhos -->
      <li class="list__item">
        <a href="/{{ size }}/{{ lights }}/6">
          <img class="item__img" src="{{ url_for('static', filename='img/battery.svg') }}" alt="battery">
          <span>6-8 aparelhos</span>
        </a>
      </li>

      <!-- Opção 3: 10 aparelhos -->
      <li class="list__item">
        <a href="/{{ size }}/{{ lights }}/10">
          <img class="item__img" src="{{ url_for('static', filename='img/battery.svg') }}" alt="battery">
          <span>10+ aparelhos</span>
        </a>
      </li>

    </ul>
  </main>
</body>
</html>
